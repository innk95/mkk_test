services:
  migrate:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.txt
    environment:
      DATABASE_URL: postgresql+asyncpg://mkk_user:mkk_password@postgres:5432/mkk
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: no

  seed:
    profiles: [seed]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.txt
    environment:
      DATABASE_URL: postgresql+asyncpg://mkk_user:mkk_password@postgres:5432/mkk
    command: ["python", "-m", "scripts.seed"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: no

  api:
    profiles: [prod]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.txt
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mkk_user:mkk_password@postgres:5432/mkk
      API_KEY: your_api_key
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api-dev:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-dev.txt
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mkk_user:mkk_password@postgres:5432/mkk
      API_KEY: testkey
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mkk
      POSTGRES_USER: mkk_user
      POSTGRES_PASSWORD: mkk_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mkk_user -d mkk"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
